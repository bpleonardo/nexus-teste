services:
  backend:
    build:
      context: ./backend
      dockerfile: ./backend/Dockerfile
    env_file:
      - ./.env
    restart: no
  postgres:
    image: postgres:latest
    env_file:
      - ./.env
    restart: no
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
  redis:
    image: redis:latest
    env_file:
      - ./.env
    restart: no
  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    restart: unless-stopped
    volumes:
      - ./resources/nginx/default.conf:/etc/nginx/conf.d/default.conf

volumes:
  postgres_data:
